name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install the hf CLI
        run: |
          curl -LsSf https://hf.co/cli/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Push to Hub
        env:
          HF_OIDC_RESOURCE: spaces/bekicot13/Edit
        run: hf upload spaces/bekicot13/Edit . --exclude ".github*" --commit-message "Sync from GitHub"
